site:
  name: RitoHouse
  site: 'https://ritohouse.com' # Actualiza esto cuando tengas tu dominio final
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Metadatos SEO - RitoHouse
metadata:
  title:
    default: RitoHouse — Rituales que transforman hogares
    template: '%s — RitoHouse'
  description: 'Piezas artesanales en yeso y cemento. Rituales con intención para armonizar tus espacios. Paysandú, Uruguay.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: RitoHouse
    images:
      - url: '~/assets/images/box-esencial.png' # Usamos una de tus fotos nuevas para redes sociales
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@ritohouse'
    site: '@ritohouse'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: false # Desactivado temporalmente si no vas a subir artículos aún

  post:
    isEnabled: false
    permalink: '/%slug%'
    robots:
      index: true

  list:
    isEnabled: false
    pathname: 'blog'
    robots:
      index: true

  category:
    isEnabled: true
    pathname: 'categoria'
    robots:
      index: true

  tag:
    isEnabled: true
    pathname: 'etiqueta'
    robots:
      index: false

  isRelatedPostsEnabled: true
  relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

# Configuración de Interfaz: Estética Clara y Orgánica
ui:
  theme: light
  showThemeSwitcher: false
